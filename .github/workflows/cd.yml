name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build & push Docker images to Docker Hub
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    # Skip entirely if Docker Hub secrets are not configured
    if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    outputs:
      image_tag:      ${{ steps.meta.outputs.version }}
      image_frontend: ${{ steps.names.outputs.frontend }}
      image_backend:  ${{ steps.names.outputs.backend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build image names from the secret (not top-level env — avoids empty-string bug)
      - name: Set image names
        id: names
        run: |
          echo "frontend=${{ secrets.DOCKERHUB_USERNAME }}/student-hub-frontend" >> $GITHUB_OUTPUT
          echo "backend=${{ secrets.DOCKERHUB_USERNAME }}/student-hub-backend"   >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tag = short SHA)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.frontend }}
          tags: |
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ──────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.names.outputs.frontend }}:latest
            ${{ steps.names.outputs.frontend }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Backend ───────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-student-hub
          push: true
          tags: |
            ${{ steps.names.outputs.backend }}:latest
            ${{ steps.names.outputs.backend }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2: Deploy to server via SSH
  # Skipped automatically if server secrets are not configured
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # optional: add manual approval in GitHub → Environments

    # Skip if server secrets are not configured
    if: ${{ secrets.SERVER_HOST != '' && secrets.SERVER_USER != '' && secrets.SERVER_SSH_KEY != '' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || '22' }}   # fixed: must be string
          script: |
            set -e

            IMAGE_FRONTEND="${{ needs.build-and-push.outputs.image_frontend }}"
            IMAGE_BACKEND="${{ needs.build-and-push.outputs.image_backend }}"

            echo "📦 Pulling latest images..."
            docker pull "${IMAGE_FRONTEND}:latest"
            docker pull "${IMAGE_BACKEND}:latest"

            echo "🔄 Restarting containers..."
            cd ~/student-hub

            # ⚠️  App secrets live ONLY on the server in .env — never in GitHub
            docker compose down
            IMAGE_FRONTEND="${IMAGE_FRONTEND}:latest" \
            IMAGE_BACKEND="${IMAGE_BACKEND}:latest" \
            docker compose up -d

            echo "✅ Deployed successfully!"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || '22' }}
          script: |
            sleep 5
            curl --fail --silent http://localhost:5001/ \
              && echo "✅ Backend healthy" \
              || echo "❌ Backend health check failed"
