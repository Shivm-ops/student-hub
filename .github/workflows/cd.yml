name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/student-hub-frontend
  IMAGE_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/student-hub-backend

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build & push Docker images
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tag = short SHA)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ──────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Backend ───────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-student-hub
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2: Deploy to server via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production    # requires manual approval gate in GitHub

    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            echo "📦 Pulling latest images..."
            docker pull ${{ env.IMAGE_FRONTEND }}:latest
            docker pull ${{ env.IMAGE_BACKEND }}:latest

            echo "🔄 Restarting containers..."
            cd ~/student-hub

            # Inject secrets from server env file (never stored in repo)
            docker compose down
            IMAGE_FRONTEND=${{ env.IMAGE_FRONTEND }}:latest \
            IMAGE_BACKEND=${{ env.IMAGE_BACKEND }}:latest \
            docker compose up -d

            echo "✅ Deployed successfully!"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sleep 5
            curl --fail http://localhost:5001/ && echo "✅ Backend healthy" || echo "❌ Backend health check failed"
