name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build & push Docker images to Docker Hub
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: shivam0023
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tag = short SHA)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: shivam0023/student-hub-frontend
          tags: |
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ──────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=http://${{ secrets.SERVER_HOST }}:5001/api
          tags: |
            shivam0023/student-hub-frontend:latest
            shivam0023/student-hub-frontend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend ───────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-student-hub
          push: true
          tags: |
            shivam0023/student-hub-backend:latest
            shivam0023/student-hub-backend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2: Deploy to server via SSH
  # Skipped automatically if server secrets are not configured
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production # optional: add manual approval in GitHub → Environments

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }} # fixed: must be string
          script: |
            set -e

            IMAGE_FRONTEND="shivam0023/student-hub-frontend:latest"
            IMAGE_BACKEND="shivam0023/student-hub-backend:latest"

            echo "📦 Pulling latest images..."
            docker pull "${IMAGE_FRONTEND}"
            docker pull "${IMAGE_BACKEND}"

            echo "🔄 Restarting containers..."
            cd ~/student-hub

            # ⚠️  App secrets live ONLY on the server in .env — never in GitHub
            docker compose down
            IMAGE_FRONTEND="${IMAGE_FRONTEND}" \
            IMAGE_BACKEND="${IMAGE_BACKEND}" \
            PORT_FRONTEND=8081 \
            PORT_BACKEND=5001 \
            docker compose up -d

            echo "✅ Deployed successfully!"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            sleep 5
            curl --fail --silent http://localhost:5001/ \
              && echo "✅ Backend healthy" \
              || echo "❌ Backend health check failed"
