name: CI — Build & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Frontend — install, lint, build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5001/api   # placeholder for build validation

  # ─────────────────────────────────────────────
  # Job 2: Backend — install & smoke test
  # ─────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-student-hub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend-student-hub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Smoke test — server starts
        run: |
          # Start server in background with dummy env vars
          PORT=5001 \
          SUPABASE_URL=https://placeholder.supabase.co \
          SUPABASE_SERVICE_ROLE_KEY=placeholder_key \
          JWT_SECRET=ci_test_secret_key \
          node server.js &

          # Wait for it to be ready
          sleep 4

          # Hit the health endpoint
          curl --fail http://localhost:5001/ || (echo "❌ Server health check failed" && exit 1)

          echo "✅ Backend started and responded successfully"

  # ─────────────────────────────────────────────
  # Job 3: Docker build validation
  # ─────────────────────────────────────────────
  docker-validate:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -t student-hub-frontend:ci .

      - name: Build backend Docker image
        run: docker build -t student-hub-backend:ci ./backend-student-hub
