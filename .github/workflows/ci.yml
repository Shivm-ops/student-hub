name: CI — Build & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Frontend — install, lint, build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5001/api   # non-secret build-time placeholder

  # ─────────────────────────────────────────────
  # Job 2: Backend — install & smoke test
  # ─────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-student-hub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend-student-hub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Smoke test — server starts and responds
        run: |
          # Start server with dummy env vars (no real secrets in CI)
          PORT=5001 \
          SUPABASE_URL=https://placeholder.supabase.co \
          SUPABASE_SERVICE_ROLE_KEY=placeholder_key \
          JWT_SECRET=ci_test_secret_key \
          node server.js &

          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait up to 10s for server to be ready
          for i in $(seq 1 10); do
            if curl --silent --fail http://localhost:5001/ > /dev/null 2>&1; then
              echo "✅ Backend responded on attempt $i"
              break
            fi
            echo "⏳ Waiting... attempt $i"
            sleep 1
            if [ "$i" -eq 10 ]; then
              echo "❌ Server did not start in time"
              kill $SERVER_PID 2>/dev/null
              exit 1
            fi
          done

          # Confirm the health endpoint returns 200
          RESPONSE=$(curl --silent --write-out "%{http_code}" http://localhost:5001/)
          echo "Response: $RESPONSE"

          kill $SERVER_PID 2>/dev/null
          echo "✅ Smoke test passed"

  # ─────────────────────────────────────────────
  # Job 3: Docker build validation
  # ─────────────────────────────────────────────
  docker-validate:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -t student-hub-frontend:ci .

      - name: Build backend Docker image
        run: docker build -t student-hub-backend:ci ./backend-student-hub
